name: Security

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "0 9 * * 1"

jobs:
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Dependency review
        uses: actions/dependency-review-action@v4

  secrets-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Detect committed secrets
        uses: gitleaks/gitleaks-action@v2

  npm-audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
        continue-on-error: true
      - name: Run npm audit when package.json exists
        shell: bash
        run: |
          if [ -f package.json ]; then
            npm ci
            npm audit --audit-level=high
          else
            echo "No package.json at repo root; skipping npm audit."
          fi
