# Run database migrations for production from GitHub Actions.
# Triggers:
# - Manual: Actions → "Database migrate" → Run workflow
# - Automatic: push to main/master when ENABLE_AUTO_PROD_MIGRATE=true
#
# Prerequisites:
# - Root package.json with workspaces and an API package that defines npm run db:migrate
# - Repository secret: DATABASE_URL_PRODUCTION
#
# Safety switch:
# - Repository secret ENABLE_AUTO_PROD_MIGRATE must be exactly "true" for auto runs.

name: Database Migration

on:
  workflow_dispatch:
    inputs:
      api_workspace:
        description: npm workspace name for the API (from that package's "name" field)
        type: string
        required: true
        default: "@memories/api"
  push:
    branches: [main, master]
    paths:
      - "apps/api/src/db/**"
      - "apps/api/drizzle/**"
      - "apps/api/drizzle.config.ts"
      - "apps/api/package.json"
      - ".github/workflows/migrate.yml"

concurrency:
  group: db-migrate-production
  cancel-in-progress: false

jobs:
  migrate-production:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Gate auto migration by secret flag
        id: gate
        shell: bash
        env:
          ENABLE_AUTO_PROD_MIGRATE: ${{ secrets.ENABLE_AUTO_PROD_MIGRATE }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual run detected: migration enabled."
            echo "run_migrate=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${ENABLE_AUTO_PROD_MIGRATE:-}" = "true" ]; then
            echo "Auto production migration enabled by secret flag."
            echo "run_migrate=true" >> "$GITHUB_OUTPUT"
          else
            echo "Auto production migration disabled (set ENABLE_AUTO_PROD_MIGRATE=true to enable)."
            echo "run_migrate=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v5
        if: ${{ steps.gate.outputs.run_migrate == 'true' }}

      - name: Require root package.json
        if: ${{ steps.gate.outputs.run_migrate == 'true' }}
        shell: bash
        run: |
          if [ ! -f package.json ]; then
            echo "No root package.json — add a monorepo with db:migrate before using this workflow."
            exit 1
          fi

      - uses: actions/setup-node@v5
        if: ${{ steps.gate.outputs.run_migrate == 'true' }}
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        if: ${{ steps.gate.outputs.run_migrate == 'true' }}
        shell: bash
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            echo "No package-lock.json — using npm install (add a lockfile for reproducible migrates)."
            npm install
          fi

      - name: Run production migrations
        if: ${{ steps.gate.outputs.run_migrate == 'true' }}
        shell: bash
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_PRODUCTION }}
          API_WORKSPACE: ${{ github.event.inputs.api_workspace || '@memories/api' }}
        run: |
          set -euo pipefail

          if [ -z "${DATABASE_URL:-}" ]; then
            echo "Missing DATABASE_URL_PRODUCTION repository secret."
            exit 1
          fi

          db_host="$(node -e "try { const u = new URL(process.env.DATABASE_URL || ''); console.log(u.hostname || ''); } catch { console.log(''); }")"
          if [ -z "${db_host}" ]; then
            echo "Unable to parse host from DATABASE_URL_PRODUCTION."
            exit 1
          fi
          if [[ "${db_host}" == *.railway.internal ]]; then
            echo "::error::DATABASE_URL_PRODUCTION points to Railway private host (${db_host}), which is not reachable from GitHub-hosted runners. Use Railway's public connection URL for GitHub Actions migrations."
            exit 1
          fi

          migrate_log="$(mktemp)"
          if ! npm run db:migrate -w "$API_WORKSPACE" 2>&1 | tee "$migrate_log"; then
            echo "::error::db:migrate failed. Printing captured migrate output and DB connectivity diagnostics."
            echo "----- begin db:migrate output -----"
            cat "$migrate_log"
            echo "----- end db:migrate output -----"

            node -e "const { Client } = require('pg'); (async () => { const client = new Client({ connectionString: process.env.DATABASE_URL }); try { await client.connect(); const { rows } = await client.query('select current_database() as db, current_user as usr, version() as version'); const row = rows[0] || {}; console.log('DB connectivity check:', { database: row.db, user: row.usr, version_prefix: typeof row.version === 'string' ? row.version.split(' ').slice(0, 2).join(' ') : 'unknown' }); } catch (err) { console.error('DB connectivity diagnostic failed:', err && err.message ? err.message : String(err)); } finally { try { await client.end(); } catch {} } })().catch((err) => { console.error('Unexpected diagnostics error:', err && err.message ? err.message : String(err)); });"

            exit 1
          fi
