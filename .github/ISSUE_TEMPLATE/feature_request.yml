name: Feature request
description: Propose an enhancement
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the proposed behavior.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope and risks
      description: Call out expected impact, risks, and non-goals.

