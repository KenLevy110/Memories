# Runs on every push to main/master and on pull requests.
# Jobs: docs-smoke (templates + governance layout), checks (optional root npm when package.json exists).
# This workflow does NOT run database migrations or deploy—add a separate workflow when you have an API workspace.
name: GitHub CI Actions

run-name: GitHub CI Actions (${{ github.event_name }})

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  docs-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Documentation layout smoke check
        shell: bash
        run: bash scripts/check-docs.sh

  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
        continue-on-error: true

      - name: Run checks when package.json exists
        shell: bash
        run: |
          if [ -f package.json ]; then
            npm ci
            npm run lint --if-present
            npm run typecheck --if-present
            npm test --if-present
          else
            echo "No package.json at repo root; skipping Node checks."
          fi

